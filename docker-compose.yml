services:
  rag-app:
    build: .
    container_name: islamic-scholar-rag
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
    volumes:
      # Persist vector store and job database on /mnt (15GB free space)
      - /mnt/rag-data:/app/data
      # Persist uploaded files (optional)
      - /mnt/rag-uploads:/app/uploads
      # Mount PDFs folder for easy upload via SCP
      - /mnt/rag-pdfs:/app/pdfs
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: rag-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # For HTTPS certificates
    depends_on:
      - rag-app
    networks:
      - rag-network

networks:
  rag-network:
    driver: bridge

volumes:
  data:
  uploads:
